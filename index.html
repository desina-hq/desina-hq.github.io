<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ديسينا | DeSina - الأناقة، الابتكار، والحلول الرقمية المتكاملة</title>
    <link rel="alternate" hreflang="en" href="en.html">
    <link rel="canonical" href="https://desinacom-web.github.io/desina/" />
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ديسينا AI - نظام Adaptive Glassmorphism 2026 */
        :root {
            --ai-glass-bg: rgba(10, 10, 10, 0.85);
            --ai-glass-text: #f3f4f6;
            --ai-glass-border: rgba(239, 68, 68, 0.4);
            --ai-header: rgba(239, 68, 68, 0.95);
        }

        /* التبديل التلقائي مع نظام الجهاز (Light Mode) */
        @media (prefers-color-scheme: light) {
            :root {
                --ai-glass-bg: rgba(255, 255, 255, 0.85);
                --ai-glass-text: #111827;
                --ai-glass-border: rgba(239, 68, 68, 0.2);
                --ai-header: #ef4444;
            }
        }

        #desina-ai-widget { position: fixed; bottom: 90px; right: 20px; z-index: 9999; font-family: 'Cairo', sans-serif; }
        
        #desina-chat-box { 
            display:none; width: 330px; height: 480px; 
            background: var(--ai-glass-bg); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--ai-glass-border); 
            border-radius: 28px; flex-direction: column; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); overflow: hidden;
            transition: all 0.3s ease-in-out;
        }

        #desina-messages { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; color: var(--ai-glass-text); scrollbar-width: none; }
        
        #desina-input-area { display: flex; background: rgba(120, 120, 120, 0.1); padding: 15px; border-top: 1px solid var(--ai-glass-border); }
        
        #desina-input { flex: 1; background: transparent; border: none; color: var(--ai-glass-text); outline: none; font-size: 14px; }

        .ai-btn-float { 
            background: #ef4444; color: white; border: none; border-radius: 50%; 
            width: 65px; height: 65px; cursor: pointer; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
        }

        .ai-btn-float:hover { transform: scale(1.1) rotate(10deg); box-shadow: 0 0 35px rgba(239, 68, 68, 0.8); }

        .msg-user { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); padding: 10px 15px; border-radius: 18px 18px 0 18px; margin-bottom: 12px; align-self: flex-end; margin-left: auto; width: fit-content; max-width: 80%; }
        
        .msg-ai { background: rgba(120, 120, 120, 0.1); border-right: 3px solid #ef4444; padding: 10px 15px; border-radius: 0 18px 18px 18px; margin-bottom: 12px; max-width: 85%; line-height: 1.6; }
    </style>
</head>
<body class="text-gray-900">

    <div id="desina-ai-widget">
        <div id="desina-chat-box">
            <div style="background: var(--ai-header); color: white; padding: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 28px 28px 0 0;">
                <span style="display: flex; align-items: center; gap: 8px;"><i class="fas fa-bolt"></i> DeSina AI</span>
                <i class="fas fa-times" style="cursor:pointer" onclick="toggleDeSina()"></i>
            </div>
            <div id="desina-messages">
                <div class="msg-ai">أهلاً بك في DeSina AI. كيف يمكنني مساعدتك في خدماتنا الـ VIP أو متجرنا اليوم؟</div>
            </div>
            <div id="desina-input-area">
                <input type="text" id="desina-input" placeholder="اطلب أي معلومة من ديسينا...">
                <button onclick="callDeSina()" style="color: #ef4444; padding-left: 10px; font-size: 20px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="ai-btn-float" onclick="toggleDeSina()">AI</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // تشفير المفتاح لحماية إمبراطورية ديسينا من مراقبة GitHub
        const _dsEnc = "QUl6YVN5RHZkYlhqd0w4eVlLZFZPcXU0bnZSSV9oeEFDT0FpSVRV";
        const API_KEY = atob(_dsEnc);
        const genAI = new GoogleGenerativeAI(API_KEY);

        const DESINA_DNA = `أنت الذكاء الاصطناعي الرسمي لـ DeSina.
        الأولوية 1: خدمات VIP Ads (سياحة، براندات عالمية، قنوات تلفزيونية).
        الأولوية 2: متجر ديسينا وكتالوج الملابس.
        الأولوية 3: مكتبة شاملة (طب، تاريخ، إسلاميات، زراعة، حيوانات، مشاريع).
        الهوية: ديسينا (DeSina).`;

        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: { parts: [{ text: DESINA_DNA }] }
        });

        window.toggleDeSina = () => {
            const box = document.getElementById('desina-chat-box');
            box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        };

        window.callDeSina = async () => {
            const input = document.getElementById("desina-input");
            const msgDiv = document.getElementById("desina-messages");
            const text = input.value.trim();
            if (!text) return;

            msgDiv.innerHTML += `<div class="msg-user">${text}</div>`;
            input.value = "";
            msgDiv.scrollTop = msgDiv.scrollHeight;

            try {
                const result = await model.generateContent(text);
                msgDiv.innerHTML += `<div class="msg-ai">${result.response.text()}</div>`;
            } catch (e) {
                msgDiv.innerHTML += `<div class="msg-ai">DeSina تعتذر، يبدو أن هناك تحديثاً جارياً. حاول مرة أخرى.</div>`;
            }
            msgDiv.scrollTop = msgDiv.scrollHeight;
        };

        document.getElementById("desina-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") callDeSina();
        });
    </script>
</body>
</html>
