<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ديسينا | DeSina</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // كود منع الرعشة (Flash) عند تحميل الصفحة للتاكد من الوضع المحفوظ
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class', // تفعيل التحكم عن طريق الكلاس وليس الأوتوماتيك
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; overflow-x: hidden; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        /* تحويل الألوان في الوضع الداكن */
        .dark body { background-color: #121212; color: #f3f4f6; }
        .dark nav { background-color: #1a1a1a !important; border-bottom: 1px solid #333; }
        .dark .nav-link { color: #e5e7eb !important; }
        .dark #digital-services { background-color: #181818 !important; }
        .dark #industrial-services { background-color: #121212 !important; }
        .dark .service-card { background-color: #1f1f1f !important; color: #f3f4f6 !important; }
        .dark .bg-white { background-color: #1a1a1a !important; }
        .dark .bg-gray-100 { background-color: #181818 !important; }
        .dark .text-gray-900, .dark .text-gray-800 { color: #f3f4f6 !important; }
        .dark .text-gray-600 { color: #9ca3af !important; }
        .dark footer { background-color: #080808 !important; }

        .hero-section {
            background-image: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(20, 20, 20, 0.98) 100%);
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        .nav-link { color: #374151; font-weight: bold; transition: 0.3s; }
        .nav-link:hover { color: #ef4444; }
        .product-link { color: #ef4444 !important; font-weight: 800; }
        .main-logo { height: 40px; border-radius: 8px; }
        .hero-logo { height: 110px; border-radius: 15px; margin: 0 auto 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .service-card { transition: 0.3s; border-top: 4px solid #ef4444; background-color: white; }
        .service-card:hover { transform: translateY(-10px); }

        .cart-icon { color: #ef4444; font-size: 22px; position: relative; transition: 0.3s; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: #000; color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 50%; font-weight: bold; }
        .dark .cart-badge { background: #ef4444; }

        @media (min-width: 769px) {
            #mobile-menu { display: flex !important; position: static; background: none; box-shadow: none; width: auto; padding: 0; flex-direction: row; }
            .burger-icon { display: none !important; }
        }

        @media (max-width: 768px) {
            #mobile-menu { 
                display: none; 
                flex-direction: column; 
                width: 32%; 
                position: fixed; 
                top: 75px; /* زيادة بسيطة عشان مساحة الزرار */
                left: 0; 
                height: 65vh; 
                background: rgba(45, 45, 48, 0.97); 
                backdrop-filter: blur(12px);
                padding: 10px 5px; 
                box-shadow: 5px 5px 15px rgba(0,0,0,0.3); 
                z-index: 9999; 
                border-right: 2px solid #ef4444;
                border-bottom-right-radius: 20px;
                overflow-y: auto;
            }
            #mobile-menu.active { display: flex !important; animation: slideInLeft 0.4s ease-out; }
            .nav-link, .product-link { 
                padding: 6px 8px; 
                border-bottom: 1px solid rgba(255,255,255,0.05); 
                width: 100%; 
                text-align: right; 
                color: white !important;
                font-size: 14px;
                white-space: nowrap; 
            }
        }
        @keyframes slideInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; left: 20px; background-color: #25d366; color: #FFF;
            border-radius: 50px; text-align: center; font-size: 30px; box-shadow: 2px 2px 3px #999; z-index: 1001;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        /* تنسيق زرار الدارك مود */
        #theme-toggle {
            background: #f1f1f1;
            border: 1px solid #ddd;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .dark #theme-toggle {
            background: #333;
            border-color: #444;
            color: #ffcc00;
        }
    </style>
</head>
