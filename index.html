<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ديسينا | DeSina - الأناقة، الابتكار، والحلول الرقمية المتكاملة</title>
    <meta name="description" content="ديسينا (DeSina): وجهتكم الرائدة في تصنيع الملابس، تصميم الأزياء، والحلول الرقمية المتكاملة.">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; overflow-x: hidden; min-height: 100vh; background-color: #000; transition: background-color 0.4s, color 0.4s; }
        .hero-section { position: relative; height: 80vh; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #000; }
        .hero-logo { height: 110px; border-radius: 15px; margin: 0 auto 20px; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .service-card { transition: 0.3s; border-top: 4px solid #ef4444; background-color: white; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .nav-link { color: #374151; font-weight: bold; transition: 0.3s; }

        /* DeSina AI Adaptive Glass Design */
        :root { --ai-glass-bg: rgba(15, 15, 15, 0.85); --ai-glass-text: #f3f4f6; --ai-glass-border: rgba(239, 68, 68, 0.3); --ai-header: rgba(239, 68, 68, 0.95); }
        @media (prefers-color-scheme: light) { :root { --ai-glass-bg: rgba(255, 255, 255, 0.85); --ai-glass-text: #111827; --ai-glass-border: rgba(239, 68, 68, 0.2); --ai-header: #ef4444; } }
        #desina-ai-widget { position: fixed; bottom: 90px; right: 20px; z-index: 9999; }
        #desina-chat-box { display:none; width: 320px; height: 450px; background: var(--ai-glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--ai-glass-border); border-radius: 24px; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.6); overflow: hidden; }
        #desina-messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; color: var(--ai-glass-text); }
        #desina-input-area { display: flex; background: rgba(120, 120, 120, 0.1); padding: 12px; border-top: 1px solid var(--ai-glass-border); }
        #desina-input { flex: 1; background: transparent; border: none; color: var(--ai-glass-text); outline: none; font-size: 14px; }
        .ai-btn-float { background: #ef4444; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .msg-user { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; padding: 8px 12px; border-radius: 15px 15px 0 15px; margin-bottom: 10px; align-self: flex-end; margin-left: auto; width: fit-content; }
        .msg-ai { background: rgba(120, 120, 120, 0.1); border-right: 3px solid #ef4444; padding: 8px 12px; border-radius: 0 15px 15px 15px; margin-bottom: 10px; line-height: 1.5; }
    </style>
</head>
<body>

    <nav class="bg-white shadow-md p-3 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html"><img src="logo.jpg" style="height:40px; border-radius:8px;" alt="DeSina Logo"></a>
            <div class="hidden md:flex gap-8">
                <a href="store.html" class="nav-link" style="color:#ef4444">المتجر</a>
                <a href="#digital-services" class="nav-link">الخدمات</a>
                <a href="#contact" class="nav-link">اتصل بنا</a>
            </div>
            <a href="https://wa.me/201102919214" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-full font-bold">واتساب</a>
        </div>
    </nav>

    <header class="hero-section text-white text-center">
        <div class="relative z-30">
            <img src="logo.jpg" class="hero-logo" alt="DeSina Logo">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4">مرحبا بكم في <span class="text-red-600">DeSina</span></h1>
            <p class="text-xl text-gray-300">الأناقة والابتكار في مكان واحد</p>
        </div>
    </header>

    <div id="desina-ai-widget">
        <div id="desina-chat-box">
            <div style="background: var(--ai-header); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fas fa-bolt"></i> DeSina AI</span>
                <i class="fas fa-times" style="cursor:pointer" onclick="toggleDeSina()"></i>
            </div>
            <div id="desina-messages">
                <div class="msg-ai">أهلاً بك في DeSina AI. كيف يمكنني مساعدتك؟</div>
            </div>
            <div id="desina-input-area">
                <input type="text" id="desina-input" placeholder="اطلب أي معلومة...">
                <button onclick="callDeSina()" style="color: #ef4444; padding-left: 10px;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="ai-btn-float" onclick="toggleDeSina()">AI</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        const _dsEnc = "QUl6YVN5RHZkYlhqd0w4eVlLZFZPcXU0bnZSSV9oeEFDT0FpSVRV";
        const API_KEY = atob(_dsEnc);
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        window.toggleDeSina = () => {
            const box = document.getElementById('desina-chat-box');
            box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        };

        window.callDeSina = async () => {
            const input = document.getElementById("desina-input");
            const msgDiv = document.getElementById("desina-messages");
            if (!input.value.trim()) return;
            const text = input.value;
            msgDiv.innerHTML += `<div class="msg-user">${text}</div>`;
            input.value = "";
            try {
                const result = await model.generateContent("أنت ديسينا AI الرسمي. أجب باحترافية: " + text);
                msgDiv.innerHTML += `<div class="msg-ai">${result.response.text()}</div>`;
            } catch (e) {
                msgDiv.innerHTML += `<div class="msg-ai">عذراً، حاول مجدداً.</div>`;
            }
            msgDiv.scrollTop = msgDiv.scrollHeight;
        };
    </script>
</body>
</html>
