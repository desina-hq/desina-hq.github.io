<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeSina Store | Premium Collection</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; }
        h1, h2, h3, .buy-btn, .filter-btn { font-weight: 900 !important; text-transform: uppercase; }
        
        /* كارت المنتج */
        .store-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .store-card:hover { border-color: #ef4444; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        .product-img-container { width: 100%; height: 280px; overflow: hidden; background: #f3f4f6; cursor: zoom-in; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .product-img:hover { transform: scale(1.05); }

        /* زر الشراء - أيقونة عربة محايدة */
        .buy-btn { background: #111827; color: white; padding: 14px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; font-size: 13px; }
        .buy-btn:hover { background: #ef4444; }

        .filter-btn { padding: 8px 22px; border-radius: 50px; background: white; border: 2px solid #eee; font-size: 14px; transition: 0.3s; }
        .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* ستايل الـ Lightbox (عرض الصورة) */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 80vh; border-radius: 10px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .lb-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 35px; cursor: pointer; }
        .lb-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; transform: translateY(-50%); }
        .lb-nav i { color: white; font-size: 40px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .lb-nav i:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="lightbox">
        <span class="lb-close" onclick="closeLightbox()">&times;</span>
        <div class="lb-nav">
            <i class="fas fa-chevron-left" onclick="prevImg()"></i>
            <i class="fas fa-chevron-right" onclick="nextImg()"></i>
        </div>
        <img id="lightbox-img" src="">
    </div>

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-2">
            <div class="flex items-center gap-4">
                <img src="logo.jpg" style="height: 38px; border-radius: 8px;">
                <a href="en.html" class="text-gray-900 font-black flex items-center gap-2 hover:text-red-600 transition text-sm">HOME <i class="fas fa-arrow-right"></i></a>
            </div>
            <div class="flex items-center gap-4">
                <a href="store.html" class="text-blue-600 font-bold hover:underline text-xs">عربي</a>
                <div class="text-red-600 text-2xl relative cursor-pointer" onclick="sendOrderToWhatsApp()">
                    <i class="fas fa-shopping-cart"></i> <span id="cart-badge" class="bg-black text-white rounded-full px-2 py-0.5 text-[10px] absolute -top-2 -right-2 hidden">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-12 text-center">
        <h1 class="text-4xl md:text-6xl text-gray-900"><span class="text-red-600">DeSina</span> STORE</h1>
        <p class="text-gray-500 font-bold mt-2 italic">Premium Collection</p>
    </header>

    <div class="flex flex-wrap justify-center gap-3 mb-12 px-4">
        <button class="filter-btn active" onclick="setCategory('all', this)">All</button>
        <button class="filter-btn" onclick="setCategory('summer', this)">Summer</button>
        <button class="filter-btn" onclick="setCategory('winter', this)">Winter</button>
    </div>

    <div class="container mx-auto px-4 mb-24">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </div>

    <script>
        const totalModels = 11;
        const grid = document.getElementById('product-grid');
        let currentFilter = 'all';
        let currentImgIndex = 1;

        function displayProducts() {
            grid.innerHTML = "";
            for (let i = 1; i <= totalModels; i++) {
                const modelName = `Model COD-${i < 10 ? '0' + i : i}`;
                const category = (i % 2 === 0) ? 'winter' : 'summer';
                if (currentFilter === 'all' || category === currentFilter) {
                    grid.innerHTML += `
                        <div class="store-card">
                            <div class="product-img-container" onclick="openLightbox(${i})">
                                <img src="cod${i}.jpeg" class="product-img">
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg text-gray-900 mb-1">${modelName}</h3>
                                <p class="text-red-600 font-black text-xl mb-4">1000 EGP</p>
                                <button class="buy-btn" onclick="addToCart('${modelName}')">
                                    <i class="fas fa-cart-plus"></i> ADD TO CART
                                </button>
                            </div>
                        </div>`;
                }
            }
        }
        displayProducts();

        function setCategory(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            displayProducts();
        }

        // --- وظائف عرض الصور (Lightbox) ---
        function openLightbox(index) {
            currentImgIndex = index;
            document.getElementById('lightbox-img').src = `cod${index}.jpeg`;
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // منع السكرول تحت الصورة
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        function nextImg() {
            currentImgIndex = currentImgIndex >= totalModels ? 1 : currentImgIndex + 1;
            document.getElementById('lightbox-img').src = `cod${currentImgIndex}.jpeg`;
        }
        function prevImg() {
            currentImgIndex = currentImgIndex <= 1 ? totalModels : currentImgIndex - 1;
            document.getElementById('lightbox-img').src = `cod${currentImgIndex}.jpeg`;
        }

        // إغلاق عند الضغط خارج الصورة
        document.getElementById('lightbox').onclick = function(e) {
            if(e.target == this) closeLightbox();
        };

        // وظائف السلة المعتادة
        let cartItems = [];
        function addToCart(name) {
            cartItems.push(name);
            const b = document.getElementById('cart-badge');
            b.innerText = cartItems.length; b.style.display = 'block';
            alert(name + " added to cart!");
        }
        function sendOrderToWhatsApp() {
            if (cartItems.length === 0) return alert("Cart is empty!");
            let msg = `New Order 🚀\n` + cartItems.join("\n");
            window.open(`https://wa.me/201001283311?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
